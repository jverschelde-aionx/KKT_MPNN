data:
  problems: ["CA"]
  is_sizes: [2]
  ca_sizes: [10]
  sc_sizes: [2]
  cfl_sizes: [5]
  rnd_sizes: [10]
  data_root: ./data/instances

model:
  lejepa_lambda: 0.027151341558686343 # Weight for SIGReg regularization (λ)
  lejepa_n_global_views: 3 # Number of global views (lightly masked)
  lejepa_n_local_views: 8 # Number of local views (heavily masked)
  sigreg_slices: 512 # Number of slices for SIGReg regularizer
  sigreg_points: 13 # Number of points for Epps-Pulley test

mlp:
  hidden: 256
  embed_dim: 128
  lejepa_local_mask: [0.40, 0.20, 0.20] # Local views masking ratios
gnn:
  embedding_size: 128
  cons_nfeats: 4
  edge_nfeats: 1
  var_nfeats: 18
  num_emb_type: periodic
  num_emb_bins: 32
  num_emb_freqs: 16
  lejepa_local_mask: 0.33751201003402975
  lejepa_global_mask: 0.8252063157958158
  dropout: 0.0

training:
  use_bipartite_graphs: true
  optimizer: adam
  weight_decay: 0.0
  scheduler: none
  warmup_pct: 0.0
  min_lr_ratio: 0.0
  devices: "0"
  batch_size: 256
  epochs: 4000
  lr: 0.001
  seed: 42
  log_every: 10
  wandb_project: kkt_gnn_pretraining
  experiments_dir: ./experiments
