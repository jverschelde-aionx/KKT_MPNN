# ── Data ─────────────────────────────────────────────────────────
problems: ["CA", "SC", "IS", "CFL"]
is_sizes: [50]
ca_sizes: [25]
sc_sizes: [50]
cfl_sizes: [50]
rnd_sizes: [50]
data_root: ./data/instances/milp
val_split: 0.15

# ── GNN encoder (match pretrain/train_block_composer) ────────────
embedding_size: 128
cons_nfeats: 9
edge_nfeats: 1
var_nfeats: 18
num_emb_type: periodic
num_emb_bins: 32
num_emb_freqs: 16
lejepa_embed_dim: 128
bipartite_conv: gatv2
attn_heads: 4
dropout: 0.05

# ── LeJEPA / SigReg ─────────────────────────────────────────────
lejepa_n_global_views: 2
lejepa_n_local_views: 8
lejepa_local_mask: 0.6
lejepa_global_mask: 0.05
lejepa_local_edge_mask: 0.05
lejepa_global_edge_mask: 0.6
lejepa_lambda: 0.256
lejepa_std_loss_weight: 0.0
sigreg_slices: 512
sigreg_points: 13

# ── Split / Composer ─────────────────────────────────────────────
num_blocks: 5
halo_hops: 0
composer_d_z: 128
composer_hidden: 256
composer_heads: 4
composer_dropout: 0.05
use_block_context: 1
use_block_gnn: 1

# ── Training ─────────────────────────────────────────────────────
batch_size: 256
max_steps: 10000
eval_every_steps: 400
save_every_steps: 400
lr: 0.0015
encoder_lr: 0.0001
optimizer: adam
weight_decay: 0.0
scheduler: cosine_warmup
warmup_pct: 0.05
min_lr_ratio: 0.1
max_grad_norm: 1.0
early_stop_patience: 5
early_stop_min_delta: 0.0
num_workers: 0
log_every: 10
seed: 42
devices: "0"
wandb_project: split_bijepa_pretraining
experiments_dir: ./experiments
lejepa_lambda_start: 0.90
lejepa_lambda_warm_steps: 1000
warm_encoder_path: /home/joachim-verschelde/Repos/KKT_MPNN/src/experiments/kkt_gnn_bijepa_for_milp_experiments/run_gnn_policy-gv=2-lv=8-slice=512-point=13-lmbd=0.256-std=0.0-dim=128-l_mask=0.6-g_mask=0.05-l_e_mask=0.05-g_e_mask=0.6-dp=0.05-l_dim=128-conv=gatv2-heads=4_20260312_181307/best_encoder.pt
finetune_mode: full
